apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-service-deployment
  labels:
    app: management-service
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: management-service
  template:
    metadata:
      labels:
        app: management-service
    spec:
      containers:
        - name: management-app
          image: management-service:c700bd60ccfa4c5b2ea66ac9cdd6540ad78bd87d
          imagePullPolicy: Always 
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/ticket_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password123"            
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"            
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"