apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-service-deployment
  labels:
    app: management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-service
  template:
    metadata:
      labels:
        app: management-service
    spec:
      containers:
        - name: management-app
          image: luisfelipealves/management-service:8ddb34af6d6b45e5f6dc986f781ea8fb73d82c15
          imagePullPolicy: Always 
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/ticket_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password123"            
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"            
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
---
apiVersion: v1
kind: Service
metadata:
  name: management-service 
spec:
  type: LoadBalancer
  selector:
    app: management-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8080
