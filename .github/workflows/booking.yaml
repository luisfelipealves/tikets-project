name: Booking Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'booking/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setting Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    # Como estamos num Monorepo, precisamos de dizer ao Maven para rodar 
    # DENTRO da pasta correta do microsserviço usando o 'working-directory'
    - name: Maven compile
      working-directory: ./booking
      run: ../mvnw clean package -DskipTests # Se o mvnw estiver na raiz, usa ../mvnw

    - name:  Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker build and push
      uses: docker/build-push-action@v5
      with:
        context: ./booking
        push: true
        tags: |
          luisfelipealves/booking-service:latest
          luisfelipealves/booking-service:${{ github.sha }}