name: Booking Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'booking/**'
  workflow_dispatch:

jobs:
  compile:
    name: ☕ Maven Compile
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setting Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Maven compile
      working-directory: ./booking
      run: mvn clean package -DskipTests
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: booking-jar
        path: booking/target/*.jar

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: compile
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: booking-jar
        path: booking/target/

    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker build and push
      uses: docker/build-push-action@v5
      with:
        context: ./booking
        push: true
        tags: |
          luisfelipealves/booking-service:latest
          luisfelipealves/booking-service:${{ github.sha }}

  deploy:
    name: 🚀 GitOps Update (ArgoCD)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: docker
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Update booking-service tag in booking-deployment.yaml
      run: |
        sed -i 's|luisfelipealves/booking-service:.*|luisfelipealves/booking-service:${{ github.sha }}|g' infrastructure/k8s/booking-deployment.yaml

    - name: Commit & Push automático sem conflitos
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore(cd): update booking-service tag to ${{ github.sha }} [skip ci]"
        file_pattern: 'infrastructure/k8s/booking-deployment.yaml'
        push_options: '--force-with-lease'